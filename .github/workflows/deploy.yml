name: Deploy para o GitHub Pages

# Publica a landing page automaticamente a cada push na branch main.
# Também pode ser disparado manualmente pela aba "Actions" do repositório.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas necessárias para o deploy no Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar o bundle estático
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar a pasta dist como artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
